<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会員リスト（社内用・デモ） | 静的ページの落とし穴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-body-tertiary">
    <header class="text-center py-4 border-bottom bg-white">
      <h1 class="h3 mb-1">🔓 会員リスト（社内用・デモ）</h1>
      <p class="text-secondary mb-0">個人情報は隠して、名前とマスクした連絡先だけ表示しています……本当に？</p>
    </header>

    <main class="container" style="max-width: 720px;">
      <div class="alert alert-warning small my-4" role="alert">
        これは <strong>「やってはいけない例」</strong> のデモページです。画面には名前とマスクした情報しか
        出していませんが、実は元データがまるごとブラウザに届いています。<strong>F12（開発者ツール）</strong>
        を開いて確かめてみましょう。手順は下のレクチャーにあります。
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">会員一覧</div>
        <div class="table-responsive">
          <table class="table table-striped mb-0 align-middle">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">お名前</th>
                <th scope="col">メール</th>
                <th scope="col">電話</th>
              </tr>
            </thead>
            <tbody id="member-rows">
              <tr><td colspan="4" class="text-secondary">読み込み中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <p class="text-secondary small">
        ※ 画面上ではメールと電話をマスク（<code>●●●</code>）しています。でも「画面に出していない」ことと
        「データを渡していない」ことは別物です。
      </p>
    </main>

    <footer class="text-center text-secondary small py-4">
      <p class="mb-0">Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
