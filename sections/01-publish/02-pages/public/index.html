<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ひとことボード</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="header">
      <h1>ひとことボード</h1>
      <p class="lead">みんなが残した「ひとこと」が並ぶ、小さな掲示板です。</p>
    </header>

    <main class="container">
      <!-- 投稿フォーム（この章ではまだ送信しても保存されません） -->
      <form class="post-form" id="post-form">
        <input type="text" name="name" placeholder="なまえ" maxlength="20" required />
        <input type="text" name="body" placeholder="ひとこと" maxlength="100" required />
        <button type="submit">投稿</button>
      </form>

      <p class="note" id="note" hidden>
        ※ この章ではフロント（見た目）だけを公開しています。投稿の保存は次章以降で API と
        データベースをつなぐと動くようになります。
      </p>

      <ul class="message-list" id="message-list">
        <!-- サンプル表示。次章で API から取得した内容に置き換えます -->
        <li class="message">
          <span class="message-name">たなか</span>
          <span class="message-body">はじめての投稿です！</span>
        </li>
        <li class="message">
          <span class="message-name">さとう</span>
          <span class="message-body">Cloudflare で公開してみた</span>
        </li>
      </ul>
    </main>

    <footer class="footer">
      <p>Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script>
      // この章のフォームはまだ保存先（API）がないので、送信されたら案内を出すだけにします。
      const form = document.getElementById('post-form');
      const note = document.getElementById('note');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        note.hidden = false;
      });
    </script>
  </body>
</html>
