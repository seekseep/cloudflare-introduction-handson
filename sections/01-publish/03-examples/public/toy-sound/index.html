<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音のなるおもちゃ | 静的ページアプリの例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      /* ピアノ全体。白鍵を横に並べ、その上に黒鍵を重ねる */
      .piano {
        position: relative;
        display: flex;
        gap: 4px;
        padding: 16px;
        background: #212529;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        overflow-x: auto;
      }

      /* 白鍵（はっけん） */
      .key-white {
        position: relative;
        flex: 1 0 44px;
        height: 200px;
        border: none;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(#fff, #f1f3f5);
        box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 12px;
        gap: 2px;
        cursor: pointer;
      }
      .key-white .note {
        font-size: 0.95rem;
        font-weight: 700;
        color: #343a40;
      }
      .key-white .kbd {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #adb5bd;
      }

      /* 黒鍵（こっけん）。白鍵の境目に浮かせて重ねる */
      .key-black {
        position: absolute;
        top: 16px;
        width: 30px;
        height: 125px;
        border: none;
        border-radius: 0 0 5px 5px;
        background: linear-gradient(#495057, #212529);
        box-shadow: 0 3px 4px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 8px;
        transform: translateX(-50%);
        cursor: pointer;
        z-index: 2;
      }
      .key-black .kbd {
        font-size: 0.65rem;
        text-transform: uppercase;
        color: #ced4da;
      }

      /* 押したときの見た目 */
      .key-white.is-active {
        background: linear-gradient(#d0ebff, #a5d8ff);
      }
      .key-black.is-active {
        background: linear-gradient(#1971c2, #1864ab);
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <header class="text-center py-4 border-bottom bg-white">
      <h1 class="h3 mb-1">🎹 音のなるおもちゃ</h1>
      <p class="text-secondary mb-0">鍵盤を押すと音がなります。キーボードの A〜K（黒鍵は W E T Y U）でも鳴らせます。</p>
    </header>

    <main class="container" style="max-width: 720px;">
      <div class="piano my-4" id="keyboard"></div>

      <div class="alert alert-primary small" role="alert">
        ※ 音は <strong>ブラウザに内蔵された Web Audio API</strong> でその場で合成しています。音声ファイルは
        使っていないので、ダウンロードもホスティングも不要で、オフラインでも鳴ります。
      </div>

      <a href="../" class="btn btn-link px-0">← 例の一覧に戻る</a>
    </main>

    <footer class="text-center text-secondary small py-4">
      <p class="mb-0">Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
