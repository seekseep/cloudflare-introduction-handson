<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>単語帳 | 静的ページアプリの例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-body-tertiary">
    <header class="text-center py-4 border-bottom bg-white">
      <h1 class="h3 mb-1">📒 単語帳</h1>
      <p class="text-secondary mb-0">1 問につき 4 つの選択肢から意味を選んで、単語を覚えましょう。</p>
    </header>

    <main class="container" style="max-width: 640px;">
      <!-- 画面1: 難易度を選ぶ -->
      <section id="screen-select" class="my-4">
        <p class="text-secondary">難易度を選んでスタート。</p>
        <div class="list-group" id="level-list"></div>
      </section>

      <!-- 画面2: クイズ -->
      <section id="screen-quiz" class="my-4" hidden>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="badge text-bg-secondary" id="level-badge">-</span>
          <span class="text-secondary small" id="progress">-</span>
        </div>
        <div class="progress mb-4" style="height: 6px;">
          <div class="progress-bar" id="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>

        <div class="card card-body text-center shadow-sm mb-4">
          <p class="text-secondary mb-1 small">次の単語の意味は？</p>
          <p class="display-6 fw-bold mb-0" id="question-term">-</p>
        </div>

        <div class="d-grid gap-2" id="choices"></div>

        <div class="text-center mt-4" id="feedback" hidden>
          <p class="fs-5 fw-bold mb-3" id="feedback-text">-</p>
          <button type="button" class="btn btn-primary fw-bold" id="next-button">次へ</button>
        </div>
      </section>

      <!-- 画面3: 結果 -->
      <section id="screen-result" class="my-4" hidden>
        <div class="card card-body text-center shadow-sm mb-4">
          <p class="text-secondary mb-1">結果</p>
          <p class="display-5 fw-bold mb-1"><span id="score">0</span> / <span id="total">0</span> 問正解</p>
          <p class="fs-5 mb-2" id="result-comment">-</p>
          <p class="text-secondary small mb-0" id="best-text" hidden>この難易度のベスト: <span id="best">-</span></p>
        </div>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary fw-bold" id="retry-button">同じ難易度でもう一度</button>
          <button type="button" class="btn btn-outline-secondary" id="back-button">難易度を選び直す</button>
        </div>
      </section>

      <div class="alert alert-primary small mt-2" role="alert">
        ※ ベストスコアはお使いのブラウザ内（localStorage）にだけ保存されます。他の人には見えず、別の端末とも
        共有されません。
      </div>

      <a href="../" class="btn btn-link px-0">← 例の一覧に戻る</a>
    </main>

    <footer class="text-center text-secondary small py-4">
      <p class="mb-0">Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
