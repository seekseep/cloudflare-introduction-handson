<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BMI 計算機 | 静的ページアプリの例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-body-tertiary">
    <header class="text-center py-4 border-bottom bg-white">
      <h1 class="h3 mb-1">⚖️ BMI 計算機</h1>
      <p class="text-secondary mb-0">身長と体重から BMI を計算します。</p>
    </header>

    <main class="container" style="max-width: 640px;">
      <form class="card card-body shadow-sm my-4" id="bmi-form">
        <div class="mb-3">
          <label for="height" class="form-label">身長（cm）</label>
          <input type="number" class="form-control" id="height" name="height" min="1" step="0.1" placeholder="170" required />
        </div>
        <div class="mb-3">
          <label for="weight" class="form-label">体重（kg）</label>
          <input type="number" class="form-control" id="weight" name="weight" min="1" step="0.1" placeholder="60" required />
        </div>
        <button type="submit" class="btn btn-primary fw-bold align-self-start">計算する</button>
      </form>

      <div class="card card-body text-center shadow-sm mb-4" id="result" hidden>
        <p class="text-secondary mb-1">あなたの BMI</p>
        <p class="display-5 fw-bold mb-1" id="bmi-value">-</p>
        <p class="fs-5 mb-0" id="bmi-category">-</p>
      </div>

      <p class="text-secondary small">
        ※ BMI = 体重(kg) ÷ 身長(m)²。判定の区分は日本肥満学会の基準を参考にしています。健康状態の判断は
        医療機関にご相談ください。
      </p>

      <a href="../" class="btn btn-link px-0">← 例の一覧に戻る</a>
    </main>

    <footer class="text-center text-secondary small py-4">
      <p class="mb-0">Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
