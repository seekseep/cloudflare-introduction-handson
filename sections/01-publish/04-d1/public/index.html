<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ひとことボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-body-tertiary">
    <header class="text-center py-4 border-bottom bg-white">
      <h1 class="h3 mb-1">💬 ひとことボード</h1>
      <p class="text-secondary mb-0">投稿が D1（データベース）に保存されます。</p>
    </header>

    <main class="container" style="max-width: 640px;">
      <form class="card card-body shadow-sm my-4" id="post-form">
        <div class="mb-3">
          <label for="name" class="form-label">名前</label>
          <input type="text" class="form-control" id="name" name="name" placeholder="なまえ" maxlength="20" required />
        </div>
        <div class="mb-3">
          <label for="body" class="form-label">内容</label>
          <textarea class="form-control" id="body" name="body" rows="2" placeholder="ひとこと" maxlength="100" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary fw-bold align-self-start">投稿</button>
      </form>

      <div class="alert alert-primary small" id="note" role="alert" hidden></div>

      <ul class="list-group mb-4" id="message-list"></ul>
    </main>

    <footer class="text-center text-secondary small py-4">
      <p class="mb-0">Cloudflare 公開・運用ハンズオン</p>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
