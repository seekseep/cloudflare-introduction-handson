<text x="205" y="208" text-anchor="middle" font-size="21" fill="#15803d" font-weight="700">◯ 向く場面</text>
<text x="205" y="240" text-anchor="middle" font-size="15" fill="#15803d" font-weight="400">小さく速く公開したい</text>
<text x="205" y="268" text-anchor="middle" font-size="15" fill="#15803d" font-weight="400">読み出しが多い（R2 の egress 無料）</text>
<text x="205" y="296" text-anchor="middle" font-size="15" fill="#15803d" font-weight="400">サーバー管理をしたくない</text>
