<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R2 アップロードデモ</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>R2 アップロードデモ</h1>
      <p class="lead">選んだファイルを R2 に保存し、URL で配信します。</p>

      <form class="upload-form" id="upload-form">
        <input type="file" id="file" required />
        <button type="submit">アップロード</button>
      </form>

      <p class="note" id="note" hidden></p>

      <h2>保存済みファイル</h2>
      <ul class="file-list" id="file-list"></ul>
    </main>

    <script>
      const form = document.getElementById('upload-form');
      const fileInput = document.getElementById('file');
      const list = document.getElementById('file-list');
      const note = document.getElementById('note');

      function showNote(text) {
        note.textContent = text;
        note.hidden = false;
      }

      async function loadFiles() {
        const res = await fetch('/api/files');
        const files = await res.json();
        list.innerHTML = '';
        for (const f of files) {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = `/files/${encodeURIComponent(f.key)}`;
          a.textContent = `${f.key}（${f.size} bytes）`;
          a.target = '_blank';
          li.appendChild(a);
          list.appendChild(li);
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;
        // ファイル名をキーにして PUT。ボディにファイルの中身をそのまま送る。
        const res = await fetch(`/files/${encodeURIComponent(file.name)}`, {
          method: 'PUT',
          headers: { 'Content-Type': file.type || 'application/octet-stream' },
          body: file,
        });
        if (res.ok) {
          showNote(`アップロードしました: ${file.name}`);
          form.reset();
          await loadFiles();
        } else {
          showNote('アップロードに失敗しました。');
        }
      });

      loadFiles();
    </script>
  </body>
</html>
