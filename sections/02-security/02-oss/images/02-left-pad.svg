<text x="480" y="40" text-anchor="middle" font-size="21" fill="#0f172a" font-weight="700">たった11行の部品が消えると…</text>
<rect x="50" y="70" width="400" height="280" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3.5"/>
<text x="70" y="96" text-anchor="start" font-size="13" fill="#b91c1c" font-weight="700">left-pad（11行・削除された）</text>
<text x="70" y="126" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">module.exports = leftpad;</text>
<text x="70" y="146" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">function leftpad (str, len, ch) {</text>
<text x="70" y="166" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  str = String(str);</text>
<text x="70" y="186" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  var i = -1;</text>
<text x="70" y="206" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  if (!ch &amp;&amp; ch !== 0) ch = ' ';</text>
<text x="70" y="226" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  len = len - str.length;</text>
<text x="70" y="246" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  while (++i &lt; len) {</text>
<text x="70" y="266" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">    str = ch + str;</text>
<text x="70" y="286" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  }</text>
<text x="70" y="306" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">  return str;</text>
<text x="70" y="326" text-anchor="start" font-size="13" fill="#0f172a" font-weight="400" font-family="'SFMono-Regular','Consolas','Noto Sans Mono','Courier New',monospace">}</text>
