<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Turnstile デモ</title>
    <link rel="stylesheet" href="/style.css" />
    <!-- Turnstile のウィジェットを読み込む -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <main class="container">
      <h1>お問い合わせ（Turnstile デモ）</h1>
      <p class="lead">
        送信前に Turnstile が「人間かどうか」を確認します。サーバー側でも検証してから処理します。
      </p>

      <form class="post-form" action="/submit" method="POST">
        <input type="text" name="name" placeholder="なまえ" maxlength="20" required />

        <!-- data-sitekey は公開してよい値。ここでは「常に成功する」テスト用キーを使用。 -->
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>

        <button type="submit">送信</button>
      </form>

      <p class="note">
        ※ このデモはテスト用キー（常に成功）を使っています。常に失敗するキーに変えると、サーバー側の
        検証で弾かれる様子を確認できます（README 参照）。
      </p>
    </main>
  </body>
</html>
